  <script id="script-source" type="text/plain">
#!/bin/bash

# --- CONFIGURATION ---
AGENT_USER="claude-agent"
SHARE_GROUP="claude-share"
AGENT_HOME="/home/$AGENT_USER"
CLAUDE_BIN="$AGENT_HOME/.local/bin/claude"

# --- HELPER: CHECK SUDO ---
check_sudo() {
    if [ "$EUID" -ne 0 ]; then
        echo "Please run with sudo (e.g., sudo $0 $1)"
        exit 1
    fi
}

case "$1" in
    setup)
        echo "[+] Creating restricted environment..."
        check_sudo
        groupadd -f "$SHARE_GROUP"
        useradd -m -s /bin/bash -g "$SHARE_GROUP" "$AGENT_USER"
        usermod -aG "$SHARE_GROUP" "$SUDO_USER"
        chmod 700 "$AGENT_HOME"
        echo "Done! Restart your terminal/session for group changes to take effect."
	;;

    allow)
	TARGET_DIR="${2:-$(pwd)}"
        check_sudo
        echo "[+] Setting up 'User-Owned' shared access for: $TARGET_DIR"

        # 1. Give ownership to YOU (The User) so Firefox is happy
        chown -R "$SUDO_USER:$SHARE_GROUP" "$TARGET_DIR"

        # 2. Reset and apply ACLs
        setfacl -bR "$TARGET_DIR"
        # Give the agent full access to existing files
        setfacl -R -m u:"$AGENT_USER":rwX "$TARGET_DIR"
        # Set the DEFAULT so new files are R/W for both you and the agent
        setfacl -R -d -m u:"$SUDO_USER":rwX,u:"$AGENT_USER":rwX "$TARGET_DIR"

        echo "Done. You are the owner (Firefox is happy), and Claude has write access."
        ;;

    run)
        # 1. Identity Pass-through
        MY_NAME=$(git config user.name || echo "Claude User")
        MY_EMAIL=$(git config user.email || echo "claude@example.com")

        # 2. Trust this specific directory (Crucial for the 'dubious ownership' error)
        sudo -u "$AGENT_USER" git config --global --add safe.directory "$(pwd)"

        # 3. API Key Pass-through
        ENV_VARS=""
        [[ ! -z "$ANTHROPIC_API_KEY" ]] && ENV_VARS="ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"

        echo "[+] Entering Claude session as $AGENT_USER..."

        # 4. Execute with all identity and permission guards active
        sudo -u "$AGENT_USER" $ENV_VARS \
          GIT_AUTHOR_NAME="$MY_NAME" \
          GIT_AUTHOR_EMAIL="$MY_EMAIL" \
          GIT_COMMITTER_NAME="$MY_NAME" \
          GIT_COMMITTER_EMAIL="$MY_EMAIL" \
          bash -c "umask 002 && cd '$(pwd)' && exec bash --login"
        ;;

    *)
        echo "Usage: $0 {setup|install|allow|run}"
        echo "  setup   : Create the user and group (Run once as root)"
        echo "  install : Download and install Claude (Run as yourself)"
        echo "  allow   : Grant Claude access to current folder (Run as root)"
        echo "  run     : Start the restricted session (Run as yourself)"
        ;;
esac
  </script>
